openapi: 3.0.0
info:
  title: API de Gerenciamento de Tarefas (Clean Architecture)
  description: API profissional para gerenciamento de tarefas e usuários, seguindo princípios de Clean Architecture e DDD.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Servidor Local

paths:
  /usuarios:
    post:
      summary: Criar um novo usuário
      tags: [Usuários]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, email, senha]
              properties:
                nome: { type: string, example: "João Silva" }
                email: { type: string, example: "joao@email.com" }
                senha: { type: string, example: "123456" }
      responses:
        201:
          description: Usuário criado com sucesso
        400:
          description: Erro de validação

  /usuarios/{id}:
    get:
      summary: Buscar usuário por ID
      tags: [Usuários]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Dados do usuário
        404:
          description: Usuário não encontrado

  /tarefas:
    get:
      summary: Listar todas as tarefas
      tags: [Tarefas]
      responses:
        200:
          description: Lista de tarefas
    post:
      summary: Criar uma nova tarefa
      tags: [Tarefas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [titulo, prazo]
              properties:
                titulo: { type: string, example: "Estudar Clean Architecture" }
                descrição: { type: string, example: "Ler o livro do Uncle Bob" }
                prazo: { type: string, format: date-time, example: "2026-12-31T23:59:59Z" }
      responses:
        201:
          description: Tarefa criada com sucesso

  /tarefas/{id}:
    get:
      summary: Buscar tarefa por ID
      tags: [Tarefas]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Dados da tarefa
        404:
          description: Tarefa não encontrada
    delete:
      summary: Deletar uma tarefa
      tags: [Tarefas]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        204:
          description: Tarefa deletada com sucesso
        400:
          description: Tarefa não pode ser deletada (não concluída ou não atrasada)
